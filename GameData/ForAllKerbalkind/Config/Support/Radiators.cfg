// All the early HeatControl radiators are passive so can't be used to cool cryogenic fuels and reduce boiloff.
// This config adds active variants to the early HeatControl radiators, which are unlocked at Spaceplanes Era Electronics.
// It also adds entry costs to all HeatControl radiators.

@PART[radiator-conformal-1]:NEEDS[SystemHeat,B9PartSwitch]:AFTER[xxxRP0]
{
    @cost = 300
    @entryCost = 2000
    MODULE
    {
        name = ModuleB9PartSwitch
        moduleID = CoolingMode
        switcherDescription = Cooling Mode
        affectDragCubes = False
        affectFARVoxels = False
        SUBTYPE
        {
            name = Default
            title = Passive Cooling
            MODULE
            {
                IDENTIFIER
                {
                    name = ModuleSystemHeatRadiator
                }
                DATA
                {
                    parentCoolingOnly = true
                    overcoolFactor = 1
                    !RESOURCE {}
                }
            }
        }
        SUBTYPE
        {
            name = ActiveCooling
            title = Active Cooling
            addedCost = 300
            requiredTech = electronicsSpaceplanes
            MODULE
            {
                IDENTIFIER
                {
                    name = ModuleSystemHeatRadiator
                }
                DATA
                {
                    parentCoolingOnly = false
                    overcoolFactor = 0.005
                    RESOURCE
                    {
                        name = ElectricCharge
                        rate = 0.0125
                    }
                }
            }
        }
    }
}

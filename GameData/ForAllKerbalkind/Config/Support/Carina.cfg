// Configure the Stock Mk3 Command Pod into the ESA Carina spacecraft concept.

// Reduce power consumption to be in line with Apollo.
@PART[mk1-3pod]:AFTER[RealismOverhaul]
{
	@MODULE[ModuleCommand]
	{
        %RESOURCE[ElectricCharge]
		{
			%rate = 1.52
		}
	}
}

// Reduce power draw to compensate for RA antennas.
@PART[mk1-3pod]:AFTER[RealismOverhaul]:NEEDS[RealAntennas]
{
	@MODULE[ModuleCommand]
	{
		@RESOURCE[ElectricCharge]
		{
			@rate -= 0.0514 // Remove Antenna idle power draw.
		}
	}
}

// Do not include a heat shield in the capsule part.
@PART[mk1-3pod]:AFTER[RealismOverhaul]
{
    !heatShieldTag = delete
	!resetHeatShieldAblator = delete
	!heatShieldDiameter = delete
	%skinMaxTemp = 1750

    %skinTempTag = Inconel
	%internalTempTag = Instruments
	%skinInsulationTag = True
	%paintEmissivityTag = 0.90

    !MODULE[ModuleAblator] {}
	!RESOURCE[Ablator] {}
	!RESOURCE[CharredAblator] {}
}

@PART[mk1-3pod]:BEFORE[RealismOverhaul]
{
    @CrewCapacity = 2
    @MODEL
    {
        %scale = 1, 0.6, 1
    }
}
@PART[mk1-3pod]:AFTER[xxxRP0]
{
    @title = CARINA Capsule
    @manufacturer = Alenia Spazio
    %RSSROConfig = true
    %TechRequired = secondGenCapsules
    %cost = 8000
    %entryCost = 0
    @description = CARINA (Capsula di Rientro Non Abitata) was an Italian uncrewed capsule concept intended to be launched on the Ariane 4 for commercial microgravity experiments.
    @description ^=:$: It was investigated in 1990-92 under an Agenzia Spaziale Italiana contract. This speculative crewed variant can support two crew and is capable of EVA.
    @description ^=:$: <b><color=green>From Stock (For All Kerbalkind Config) mod</color></b>

    // The real concept uses Hydrazine, but that's a bit too advanced for a second gen capsule. Use HTP instead so Viking parts can be reused.
    !MODULE[ModuleRCS*],* {}
	MODULE
	{
		name = ModuleRCSFX
		runningEffectName = running
		thrusterTransformName = thrustTransform
		thrusterPower = 0.4448222
		PROPELLANT
        {
            name = HTP
            ratio = 1.0
            DrawGauge = True
        }
        atmosphereCurve
        {
            key,0 = 0 167
            key,1 = 1 110
        }
	}

    @MODULE[ModuleFuelTanks]
	{
		@volume = 500

        !TANK[MMH] {}
        !TANK[NTO] {}
		TANK
		{
			name = HTP
			amount = 100
			maxAmount = 100
		}

        // Default life support config is for three with twice the available volume, so reduce to a third.
        @TANK[ElectricCharge]
		{
			@maxAmount *= 0.33
			@amount *= 0.33
		}
		@TANK[Food]
		{
			@maxAmount *= 0.33
			@amount *= 0.33
		}
		@TANK[Water]
		{
			@maxAmount *= 0.33
			@amount *= 0.33
		}
		@TANK[Oxygen]
		{
			@maxAmount *= 0.33
			@amount *= 0.33
		}
		@TANK[CarbonDioxide]
		{
			@maxAmount *= 0.33
			@amount *= 0.33
		}
		@TANK[Waste]
		{
			@maxAmount *= 0.33
			@amount *= 0.33
		}
		@TANK[WasteWater]
		{
			@maxAmount *= 0.33
			@amount *= 0.33
		}
		@TANK[LithiumHydroxide]
		{
			@maxAmount *= 0.33
			@amount *= 0.33
		}
	}
}
@PART[mk1-3pod]:AFTER[RO-KerbalismHardDrives]
{
	!MODULE[HardDrive] {}
	MODULE
	{
		name = HardDrive
		title = Data Storage
		dataCapacity = #$@KERBALISM_HDD_SIZES/gemini/data$
		sampleCapacity = #$@KERBALISM_HDD_SIZES/gemini/samples$
	}
}
@PART[mk1-3pod]:FOR[RP-0-Kerbalism]
{
	%capsuleTier = SecondGen
}

// Entry cost modifiers.
@ENTRYCOSTMODS:AFTER[RP-0]
{
    Carina = 100000, capsulesSecondGen, capsulesAirlock
}
@ENTRYCOSTMODS:AFTER[xxxRP-0]
{
    %mk1-3pod = Carina
}
